kind = "video"
previewPath = "/suno-video/"
title = "Suno India — Animated Video"
version = "1.0.0"
id = "artifacts/suno-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/suno-video/" ]
localPort = 20112

[services.development]
run = "pnpm --filter @workspace/suno-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/suno-video", "run", "build" ]
publicDir = "artifacts/suno-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20112"
BASE_PATH = "/suno-video/"
